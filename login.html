<!-- File: index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduVerse Login</title>
  <style>
  /* File: style.css */
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: sans-serif;
  background: radial-gradient(circle at top right, #bb023c, #000000 70%);
  background-size: cover;
  background-repeat: no-repeat;
  background-attachment: fixed;
  color: white;
}
.container {
  background-color: rgba(255, 255, 255, 0.1); /* 0.1 means 10% white */
  box-shadow: 0 4px 12px rgba(171, 169, 169, 0.2);
  backdrop-filter: blur(10px); /* Optional: adds glassmorphism effect */
  -webkit-backdrop-filter: blur(10px); /* Safari support */    
  padding: 2rem;
  border-radius: 10px;
  box-shadow: 0 4px 8px rgba(134, 133, 133, 0.1);
  width: 300px;
  text-align: center;
}
input, select {
  width: 100%;
  padding: 0.5rem;
  margin: 0.5rem 0;
}
button {
  padding: 0.5rem;
  width: 100%;
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
}
button:hover {
  background: #014d9f;
}
#error {
  color: red;
  margin-top: 1rem;
}
</style>
</head>
<body>
  <div class="container">
    <h2>EduVerse - Login</h2>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required />
      <input type="password" id="password" placeholder="Password" required />
      <select id="role">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
        <option value="admin">Admin</option>
      </select>
      <button type="submit">Login</button>
    </form>
    <p id="error"></p>
  </div>

  <script>


// File: script.js
const loginForm = document.getElementById("loginForm");
const errorP = document.getElementById("error");

const users = [
  { username: "student1", password: "pass123", role: "student" },
  { username: "teacher1", password: "pass123", role: "teacher" },
  { username: "admin1", password: "pass123", role: "admin" },
];

loginForm.addEventListener("submit", function (e) {
  e.preventDefault();

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const role = document.getElementById("role").value;

  const user = users.find(
    (u) => u.username === username && u.password === password && u.role === role
  );

  if (user) {
    alert(`Welcome ${user.role.toUpperCase()} - ${user.username}`);
    // Redirect to role-based dashboard (for demo, just show message)
  } else {
    errorP.textContent = "Invalid credentials or role!";
  }
});
</script>
</body>
</html>
